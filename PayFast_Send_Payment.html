<!doctype html>
<html lang="en">
<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Send Money</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<style>

	body {
     background-color: #89cff0;
	}

	h1 {
     font-size: 125px;
     margin-bottom: 40px;
	}

	.form-control {
     background: #ffd200;
     border: none;
     border-radius: 30px;
     height: 50px;
     text-align: center;
     font-size: 18px;
	}

	.btn-send {
     background: #ffd200;
     border: none;
     padding: 12px 30px;
     margin-top: 30px;
     font-size: 30px;
	}

	.logo img {
     width: 100px;
     margin-top: 65px;
     cursor: pointer;
	}
	
	.mb-3 {
	 font-size: 50px;
	}

	.btn-send:hover {
	 background: #f0f0f0; 
	}
	
</style>

<body>

<div class="container d-flex flex-column justify-content-center align-items-center vh-100 text-center">

  <h1>Send Money</h1>


  <form action="PayFast_Page_After_Payment.html">

    <div class="mb-3">
      <label>Recipient username</label>
      <input type="text" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Amount</label>
      <input type="number" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Note (optional)</label>
      <input type="text" class="form-control">
    </div>

    <button type="submit" class="btn-send">Send payment</button>

  </form>


  <div class="logo">
    <a href="PayFast_Page_After_Payment.html">
      <img src="PayFastLogo.png" alt="Logo">
    </a>
  </div>

</div>

</body>
</html>
