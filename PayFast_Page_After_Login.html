<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PayFast_Page_After_Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background-color: #89cff0;
}

h1 {
    font-size: 100px;
    margin-top: 25px;
}

.mt-4 {
    font-size: 50px;
    border: none;
}

.info-box {
    background: #ffd200;
    border-radius: 30px;
    height: 40px;
    width: 200px;
    margin-top: 25px;
}

.logo {
    text-align: center;
    cursor: pointer;
    margin-top: 60px;
    color: #DC143C;
	align: bottom;
}

.logo img {
    width: 115px;
    height: 115px;
}

.logo_logout {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.logo_logout img {
    width: 175px;
    height: auto;
    cursor: pointer;
}

.menu-item {
    background: #ffd200;
    padding: 12px 20px;
    border-radius: 20px;
    width: 260px;
    text-align: center;
    font-size: 22px;
    margin-top: 5px;
}

.menu-item:hover {
    background: #ffd200;
}


.carousel-container {
    width: 800px;
    max-width: 100%;
    margin: 50px auto;
}

.carousel-item img {
    height: 400px;
    object-fit: cover;
    border-radius: 15px;
}

@media (max-width: 1000px) {

    .carousel-container {
        width: 400px;
    }

    .carousel-item img {
        height: 200px;
    }

    h1 {
        font-size: 50px;
    }

    .mt-4 {
        font-size: 28px;
    }
}

	h3
		{
			margin-top: 80px;
			font-size: 70px;
		}

</style>

</head>

<body>

<div class="container text-center">

    <h1>Welcome</h1>
  
  
	<h3>Currencies we have available:</h3>
	
    <div class="carousel-container">

        <div id="carouselExample"
             class="carousel slide"
             data-bs-ride="carousel"
             data-bs-interval="3000">

            <div class="carousel-indicators">

                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="3"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="4"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="5"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="6"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="7"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="8"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="9"></button>

            </div>

            <div class="carousel-inner shadow-lg">

                <div class="carousel-item active">
                    <img src="Dolar.png" class="d-block w-100" alt="Dollar">
                </div>

                <div class="carousel-item">
                    <img src="Euro.png" class="d-block w-100" alt="Euro">
                </div>

                <div class="carousel-item">
                    <img src="AUD.png" class="d-block w-100" alt="AUD">
                </div>

                <div class="carousel-item">
                    <img src="CD.png" class="d-block w-100" alt="CAD">
                </div>

                <div class="carousel-item">
                    <img src="GBP.png" class="d-block w-100" alt="GBP">
                </div>

                <div class="carousel-item">
                    <img src="INR.png" class="d-block w-100" alt="INR">
                </div>

                <div class="carousel-item">
                    <img src="KWD.png" class="d-block w-100" alt="CHF">
                </div>

                <div class="carousel-item">
                    <img src="TURLIRA.png" class="d-block w-100" alt="RUB">
                </div>

                <div class="carousel-item">
                    <img src="Yen.png" class="d-block w-100" alt="Yen">
                </div>

                <div class="carousel-item">
                    <img src="Yuan.png" class="d-block w-100" alt="Yuan">
                </div>

            </div>

            <button class="carousel-control-prev"
                    type="button"
                    data-bs-target="#carouselExample"
                    data-bs-slide="prev">

                <span class="carousel-control-prev-icon"></span>

            </button>

            <button class="carousel-control-next"
                    type="button"
                    data-bs-target="#carouselExample"
                    data-bs-slide="next">

                <span class="carousel-control-next-icon"></span>

            </button>

        </div>

    </div>


    <div class="logo">

        <a href="PayFast_Hello_User.html">
            <img src="PayFastLogo.png" alt="PayFast Logo">
        </a>

    </div>

</div>

<div class="logo_logout">

    <a href="index.html">
        <img src="Logout_Dugme_Final.png" alt="Logout">
    </a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
