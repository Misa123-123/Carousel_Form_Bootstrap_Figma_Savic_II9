<!doctype html>
<html lang="en">
 <head>
 
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PayFast_Main</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	
 </head>

<style>

body{
    background-color:#89cff0;
}

.login-box{
    max-width:750px;
    margin:auto;
    margin-top:0;
}

.title{
    font-size:150px;
    text-align:center;
    margin-bottom:150px;
}

.form-control{
    background-color:#ffd500;
    border-radius:150px;
    border:none;
}

label{
    font-size:350px;
}

.logo{ 
	text-align:center; 
	margin-top:100px; 
	color:#DC143C; 
}

.logo img{
    width:125px;
    height:125px;
}

.title{
	font-size:100px;
	margin-top:50px;
}

</style>


<body>

<div class="container">
    
    <div class="login-box text-dark">

        <h1 class="title"> PayFast </h1>

    <form action="PayFast_Page_After_Login.html" method="get">

            <div class="mb-4 row">
                <label class="col-sm-6 col-form-label fs-1">User:</label>
                <div class="col-sm-9">
                    <input type="text" class="form-control" required>
                </div>
            </div>

            <div class="mb-4 row">
                <label class="col-sm-6 col-form-label fs-1">E-mail:</label>
                <div class="col-sm-9">
                    <input type="email" class="form-control" required>
                </div>
            </div>

            <div class="mb-4 row">
                <label class="col-sm-6 col-form-label fs-1">Password:</label>
                <div class="col-sm-9">
                    <input type="password" class="form-control" required>
                </div>
            </div>

        

		<div class="logo">
    
			<button type="submit" class="btn p-0 border-0 bg-transparent">
				<img src="PayFastLogo.png" alt="PayFast Logo">
			</button>

		</div>

    </div>

	</form>

</div>

</body>
</html>
